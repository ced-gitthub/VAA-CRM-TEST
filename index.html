<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VA CRM — Login</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">VA<span>CRM</span></div>
    <div class="login-sub">Virtual Assistant Agency Dashboard</div>
    <h2>Sign in</h2>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@agency.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div id="login-error" style="color:var(--red);font-size:0.82rem;margin-bottom:12px;display:none;"></div>
    <button class="btn btn-primary btn-full" id="login-btn" onclick="doLogin()">Sign in</button>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script>
async function doLogin() {
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  errEl.style.display = 'none';
  if (!email || !password) { errEl.textContent = 'Enter email and password.'; errEl.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = 'Signing in…';
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    errEl.textContent = error.message; errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Sign in';
  } else {
    window.location.href = 'dashboard.html';
  }
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
