<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VA CRM — Clients</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
<div class="app-layout">
  <div class="topbar">
    <div class="topbar-logo">VA<span>CRM</span></div>
    <button class="menu-toggle" id="menu-toggle">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </div>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">VA<span>CRM</span></div>
      <div class="sidebar-tagline">Agency Dashboard</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a href="dashboard.html" class="nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="clients.html" class="nav-link active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Clients
      </a>
      <a href="vas.html" class="nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        Virtual Assistants
      </a>
      <a href="assignments.html" class="nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
        Assignments
      </a>
      <div class="nav-section-label">Records</div>
      <a href="changelog.html" class="nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        Change Log
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="user-avatar">?</div>
        <div class="user-email" id="user-email">Loading…</div>
      </div>
      <button class="btn btn-ghost btn-sm btn-full" onclick="logout()">Sign out</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <div>
        <div class="page-title">Clients</div>
        <div class="page-subtitle">Manage client accounts and contracts</div>
      </div>
      <button class="btn btn-primary" onclick="openModal()">+ Add Client</button>
    </div>

    <div class="table-card">
      <div class="table-header">
        <div class="table-title">All Clients</div>
        <div class="table-actions">
          <input type="text" class="search-input" id="search" placeholder="Search clients…" oninput="filterTable()">
          <select class="search-input" id="filter-status" onchange="filterTable()" style="width:auto">
            <option value="">All statuses</option>
            <option value="active">Active</option>
            <option value="paused">Paused</option>
            <option value="ended">Ended</option>
          </select>
        </div>
      </div>
      <div id="table-body">
        <div class="empty-state"><div class="empty-state-icon">⏳</div>Loading…</div>
      </div>
    </div>
  </main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Add Client</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-id">
      <div class="form-row">
        <div class="form-group">
          <label>Company Name *</label>
          <input type="text" id="f-company" placeholder="Acme Corp">
        </div>
        <div class="form-group">
          <label>Contact Person</label>
          <input type="text" id="f-contact" placeholder="Jane Doe">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="f-email" placeholder="client@company.com">
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="f-status">
            <option value="active">Active</option>
            <option value="paused">Paused</option>
            <option value="ended">Ended</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Hourly Rate (₱)</label>
          <input type="number" id="f-rate" placeholder="0.00" min="0" step="0.01">
        </div>
        <div class="form-group"><!-- spacer --></div>
      </div>
      <div class="form-group">
        <label>Contract Details / Notes</label>
        <textarea id="f-contract" placeholder="Contract terms, billing cycle, special notes…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="save-btn" onclick="saveClient()">Save Client</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script>
let allClients = [];

const statusBadge = s => ({
  active: '<span class="badge badge-green">Active</span>',
  paused: '<span class="badge badge-yellow">Paused</span>',
  ended:  '<span class="badge badge-gray">Ended</span>',
}[s] || s);

async function loadClients() {
  const { data, error } = await sb.from('clients').select('*').order('created_at', { ascending: false });
  if (error) { toast('Error loading clients', 'error'); return; }
  allClients = data || [];
  renderTable(allClients);
}

function renderTable(data) {
  const el = document.getElementById('table-body');
  if (!data.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🏢</div>No clients yet. Add your first one.</div>';
    return;
  }
  el.innerHTML = `<table>
    <thead><tr>
      <th>Company</th>
      <th class="hide-mobile">Contact</th>
      <th class="hide-mobile">Email</th>
      <th>Status</th>
      <th class="hide-mobile">Rate</th>
      <th></th>
    </tr></thead>
    <tbody>
      ${data.map(c => `<tr>
        <td><strong>${esc(c.company_name)}</strong></td>
        <td class="hide-mobile">${esc(c.contact_person || '—')}</td>
        <td class="hide-mobile td-secondary">${esc(c.email || '—')}</td>
        <td>${statusBadge(c.status)}</td>
        <td class="hide-mobile">${c.hourly_rate ? '₱' + Number(c.hourly_rate).toLocaleString('en-PH', {minimumFractionDigits:2}) : '—'}</td>
        <td><div class="td-actions">
          <button class="btn btn-ghost btn-sm" onclick="editClient('${c.id}')">Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deleteClient('${c.id}', '${esc(c.company_name)}')">Delete</button>
        </div></td>
      </tr>`).join('')}
    </tbody>
  </table>`;
}

function filterTable() {
  const q = document.getElementById('search').value.toLowerCase();
  const s = document.getElementById('filter-status').value;
  renderTable(allClients.filter(c =>
    (!q || c.company_name?.toLowerCase().includes(q) || c.contact_person?.toLowerCase().includes(q) || c.email?.toLowerCase().includes(q)) &&
    (!s || c.status === s)
  ));
}

function openModal(client = null) {
  document.getElementById('modal-title').textContent = client ? 'Edit Client' : 'Add Client';
  document.getElementById('edit-id').value = client?.id || '';
  document.getElementById('f-company').value = client?.company_name || '';
  document.getElementById('f-contact').value = client?.contact_person || '';
  document.getElementById('f-email').value = client?.email || '';
  document.getElementById('f-status').value = client?.status || 'active';
  document.getElementById('f-rate').value = client?.hourly_rate || '';
  document.getElementById('f-contract').value = client?.contract_details || '';
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function editClient(id) {
  const c = allClients.find(x => x.id === id);
  if (c) openModal(c);
}

async function saveClient() {
  const id = document.getElementById('edit-id').value;
  const company = document.getElementById('f-company').value.trim();
  if (!company) { toast('Company name is required', 'error'); return; }

  const payload = {
    company_name: company,
    contact_person: document.getElementById('f-contact').value.trim() || null,
    email: document.getElementById('f-email').value.trim() || null,
    status: document.getElementById('f-status').value,
    hourly_rate: parseFloat(document.getElementById('f-rate').value) || null,
    contract_details: document.getElementById('f-contract').value.trim() || null,
  };

  const btn = document.getElementById('save-btn');
  btn.disabled = true;

  if (id) {
    const old = allClients.find(x => x.id === id);
    const { error } = await sb.from('clients').update(payload).eq('id', id);
    if (error) { toast('Error saving: ' + error.message, 'error'); btn.disabled = false; return; }
    // Log changes
    for (const key of ['status', 'hourly_rate', 'contract_details']) {
      if (old && String(old[key] ?? '') !== String(payload[key] ?? '')) {
        await logChange('clients', id, key, old[key], payload[key]);
      }
    }
    toast('Client updated', 'success');
  } else {
    const { data, error } = await sb.from('clients').insert(payload).select().single();
    if (error) { toast('Error saving: ' + error.message, 'error'); btn.disabled = false; return; }
    await logChange('clients', data.id, 'created', null, company);
    toast('Client added', 'success');
  }

  btn.disabled = false;
  closeModal();
  loadClients();
}

async function deleteClient(id, name) {
  if (!confirm(`Delete "${name}"? This will also remove their assignments.`)) return;
  const { error } = await sb.from('clients').delete().eq('id', id);
  if (error) { toast('Error deleting: ' + error.message, 'error'); return; }
  toast('Client deleted', 'success');
  loadClients();
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

loadClients();
</script>
</body>
</html>
